<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — Lua Acessórios Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="../logo-lua.webp" alt="" style="width:28px;height:28px;object-fit:contain;border-radius:4px"> Lua Acessórios</div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__item"><span>📊</span> Dashboard</a>
      <a href="pedidos.html" class="sidebar__item"><span>📦</span> Pedidos</a>
      <a href="produtos.html" class="sidebar__item"><span>🏷️</span> Produtos</a>
      <a href="categorias.html" class="sidebar__item"><span>📂</span> Categorias</a>
      <a href="../index.html" class="sidebar__item" target="_blank"><span>🌐</span> Ver Site</a>
    </nav>
    <div class="sidebar__bottom">
      <div style="font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:8px" id="admin-email-display"></div>
      <button class="sidebar__item" onclick="logout()"><span>🚪</span> Sair</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Pedidos</h1>
    </div>
    <div class="admin-content">

      <!-- ── Cards de Resumo ─────────────────────────────────── -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--red">📦</div>
          <div class="stat-card__val" id="stat-total">—</div>
          <div class="stat-card__label">Pedidos no Total</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--yellow">⏳</div>
          <div class="stat-card__val" id="stat-pendente">—</div>
          <div class="stat-card__label">Pendentes</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--blue">✅</div>
          <div class="stat-card__val" id="stat-confirmado">—</div>
          <div class="stat-card__label">Confirmados</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--green">🚚</div>
          <div class="stat-card__val" id="stat-enviado">—</div>
          <div class="stat-card__label">Enviados</div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon" style="background:#f5f3ff">💰</div>
          <div class="stat-card__val" id="stat-faturamento" style="font-size:1.35rem">—</div>
          <div class="stat-card__label">Faturamento</div>
        </div>
      </div>

      <!-- ── Tabela de Pedidos ───────────────────────────────── -->
      <div class="table-card">
        <div class="table-header">
          <h2>Todos os Pedidos</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">

            <!-- Filtro de período -->
            <select class="form-control" id="period-filter" style="width:auto;padding:8px 12px" onchange="onPeriodChange()">
              <option value="todos">Todos os períodos</option>
              <option value="hoje" selected>Hoje</option>
              <option value="ontem">Ontem</option>
              <option value="7dias">7 dias</option>
              <option value="14dias">14 dias</option>
              <option value="personalizado">Personalizado</option>
            </select>

            <!-- Intervalo personalizado (oculto por padrão) -->
            <div id="custom-range" style="display:none;gap:6px;align-items:center">
              <label style="font-size:.8rem;color:var(--text-muted);white-space:nowrap">De</label>
              <input type="date" class="form-control" id="date-from" style="padding:8px 10px" onchange="applyFilters()">
              <label style="font-size:.8rem;color:var(--text-muted);white-space:nowrap">Até</label>
              <input type="date" class="form-control" id="date-to" style="padding:8px 10px" onchange="applyFilters()">
            </div>

            <!-- Filtro de status -->
            <select class="form-control" id="status-filter" style="width:auto;padding:8px 12px" onchange="applyFilters()">
              <option value="">Todos os status</option>
              <option value="pendente">Pendente</option>
              <option value="confirmado">Confirmado</option>
              <option value="enviado">Enviado</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>Código</th><th>Cliente</th><th>WhatsApp</th>
              <th>Cidade / UF</th><th>Total</th><th>Status</th><th>Data</th><th>Ações</th>
            </tr></thead>
            <tbody id="orders-table">
              <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Modal Detalhes -->
<div class="modal-admin" id="modal-pedido">
  <div class="modal-admin__box">
    <div class="modal-admin__head">
      <h2 id="modal-pedido-title">Pedido</h2>
      <button class="btn btn--secondary btn--sm" onclick="closeModalPedido()">✕</button>
    </div>
    <div class="modal-admin__body" id="modal-pedido-body"></div>
    <div class="modal-admin__foot">
      <select class="form-control" id="status-select" style="width:auto;padding:8px 12px">
        <option value="pendente">Pendente</option>
        <option value="confirmado">Confirmado</option>
        <option value="enviado">Enviado</option>
        <option value="cancelado">Cancelado</option>
      </select>
      <button class="btn btn--primary" onclick="updateStatus()">Salvar Status</button>
      <button class="btn btn--secondary" onclick="closeModalPedido()">Fechar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/cart.js"></script>
<script src="../js/admin.js"></script>
<script>
requireAdmin();
let currentPedidoId = null;
let allPedidos = [];

// ── Helpers de data (fuso de São Paulo) ─────────────────────

function getSPNow() {
  return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
}

function toDBStr(d) {
  const p = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}:${p(d.getSeconds())}`;
}

function getDateBounds() {
  const period = document.getElementById('period-filter').value;
  if (period === 'todos') return null;

  const now = getSPNow();
  const todayStart = new Date(now);
  todayStart.setHours(0, 0, 0, 0);

  if (period === 'hoje') {
    return { from: toDBStr(todayStart), to: toDBStr(now) };
  }
  if (period === 'ontem') {
    const s = new Date(todayStart);
    s.setDate(s.getDate() - 1);
    const e = new Date(s);
    e.setHours(23, 59, 59, 0);
    return { from: toDBStr(s), to: toDBStr(e) };
  }
  if (period === '7dias') {
    const s = new Date(todayStart);
    s.setDate(s.getDate() - 6);
    return { from: toDBStr(s), to: toDBStr(now) };
  }
  if (period === '14dias') {
    const s = new Date(todayStart);
    s.setDate(s.getDate() - 13);
    return { from: toDBStr(s), to: toDBStr(now) };
  }
  if (period === 'personalizado') {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    return {
      from: from ? `${from} 00:00:00` : null,
      to:   to   ? `${to} 23:59:59`   : null,
    };
  }
  return null;
}

// ── Exibir / ocultar intervalo personalizado ─────────────────

function onPeriodChange() {
  const period = document.getElementById('period-filter').value;
  const box = document.getElementById('custom-range');
  box.style.display = period === 'personalizado' ? 'flex' : 'none';
  applyFilters();
}

// ── Atualizar cards de resumo ────────────────────────────────

function updateStats(pedidos) {
  document.getElementById('stat-total').textContent      = pedidos.length;
  document.getElementById('stat-pendente').textContent   = pedidos.filter(p => p.status === 'pendente').length;
  document.getElementById('stat-confirmado').textContent = pedidos.filter(p => p.status === 'confirmado').length;
  document.getElementById('stat-enviado').textContent    = pedidos.filter(p => p.status === 'enviado').length;

  const fat = pedidos
    .filter(p => p.status !== 'cancelado')
    .reduce((acc, p) => acc + (p.total || 0), 0);
  document.getElementById('stat-faturamento').textContent = formatMoney(fat);
}

// ── Aplicar filtros e renderizar ─────────────────────────────

function applyFilters() {
  const bounds = getDateBounds();
  const status = document.getElementById('status-filter').value;

  // Filtro de data (base para os cards)
  let byDate = allPedidos;
  if (bounds) {
    byDate = allPedidos.filter(p => {
      const d = p.criado_em || '';
      if (bounds.from && d < bounds.from) return false;
      if (bounds.to   && d > bounds.to)   return false;
      return true;
    });
  }

  // Cards refletem todos os status dentro do período
  updateStats(byDate);

  // Filtro de status aplicado só na tabela
  const displayed = status ? byDate.filter(p => p.status === status) : byDate;
  renderTable(displayed);
}

// ── Renderizar linhas da tabela ──────────────────────────────

function renderTable(pedidos) {
  const tbody = document.getElementById('orders-table');
  tbody.innerHTML = pedidos.length === 0
    ? `<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted)">Nenhum pedido encontrado.</td></tr>`
    : pedidos.map(p => `
        <tr>
          <td><strong style="color:var(--brand)">${p.codigo}</strong></td>
          <td>${p.nome_cliente}</td>
          <td><a href="https://wa.me/55${p.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:#25d366">📱 ${p.whatsapp}</a></td>
          <td>${p.cidade} / ${p.estado}</td>
          <td>${formatMoney(p.total)}</td>
          <td><span class="badge badge--${p.status}">${STATUS_LABELS[p.status]}</span></td>
          <td style="color:var(--text-muted);font-size:.8rem">${formatDate(p.criado_em)}</td>
          <td><button class="btn btn--secondary btn--sm" onclick="openPedido(${p.id})">Ver</button></td>
        </tr>`).join('');
}

// ── Carregar todos os pedidos da API ─────────────────────────

async function loadPedidos() {
  const res = await apiFetch('/api/admin/pedidos');
  if (!res) return;
  allPedidos = await res.json();
  applyFilters();
}

// ── Modal de detalhes ────────────────────────────────────────

async function openPedido(id) {
  currentPedidoId = id;
  const res = await apiFetch(`/api/admin/pedido/${id}`);
  if (!res) return;
  const p = await res.json();
  document.getElementById('modal-pedido-title').textContent = `Pedido ${p.codigo}`;
  document.getElementById('status-select').value = p.status;
  const itensHtml = (p.itens || []).map(i => `
    <tr>
      <td><strong>${i.ref}</strong></td>
      <td>${i.material_nome}</td>
      <td style="text-align:center">${i.quantidade}</td>
      <td style="text-align:right">${formatMoney(i.preco_unitario)}</td>
      <td style="text-align:right;font-weight:700">${formatMoney(i.subtotal)}</td>
    </tr>`).join('');
  document.getElementById('modal-pedido-body').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;font-size:.9rem">
      <div><strong>Cliente:</strong> ${p.nome_cliente}</div>
      <div><strong>WhatsApp:</strong> <a href="https://wa.me/55${p.whatsapp.replace(/\D/g,'')}" target="_blank" style="color:#25d366">${p.whatsapp}</a></div>
      ${p.documento ? `<div><strong>CNPJ/CPF:</strong> ${p.documento}</div>` : '<div></div>'}
      ${p.inscricao_estadual ? `<div><strong>Insc. Estadual:</strong> ${p.inscricao_estadual}</div>` : '<div></div>'}
      <div style="grid-column:1/-1"><strong>Endereço:</strong> ${[p.endereco, p.numero].filter(Boolean).join(', ') || '—'}</div>
      <div><strong>Cidade / UF:</strong> ${p.cidade} / ${p.estado}</div>
      ${p.cep ? `<div><strong>CEP:</strong> ${p.cep}</div>` : '<div></div>'}
      <div><strong>Data:</strong> ${formatDate(p.criado_em)}</div>
      ${p.observacoes ? `<div style="grid-column:1/-1"><strong>Obs.:</strong> ${p.observacoes}</div>` : ''}
    </div>
    <table style="width:100%;border-collapse:collapse;font-size:.875rem">
      <thead><tr style="background:var(--surface-2)">
        <th style="padding:8px;text-align:left">REF</th>
        <th style="padding:8px;text-align:left">Material</th>
        <th style="padding:8px;text-align:center">Qtd</th>
        <th style="padding:8px;text-align:right">Unit.</th>
        <th style="padding:8px;text-align:right">Subtotal</th>
      </tr></thead>
      <tbody>${itensHtml}</tbody>
      <tfoot><tr style="background:var(--brand-light);font-weight:700">
        <td colspan="4" style="padding:10px;text-align:right">TOTAL</td>
        <td style="padding:10px;text-align:right;color:var(--brand)">${formatMoney(p.total)}</td>
      </tr></tfoot>
    </table>`;
  document.getElementById('modal-pedido').classList.add('open');
}

function closeModalPedido() {
  document.getElementById('modal-pedido').classList.remove('open');
  currentPedidoId = null;
}

async function updateStatus() {
  if (!currentPedidoId) return;
  const status = document.getElementById('status-select').value;
  const res = await apiFetch(`/api/admin/pedido/${currentPedidoId}`, {
    method: 'PATCH', body: JSON.stringify({ status }),
  });
  if (!res) return;
  showToastAdmin('Status atualizado!');
  closeModalPedido();
  loadPedidos();
}

// Abrir pedido via URL ?id=
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('id')) openPedido(urlParams.get('id'));

loadPedidos();
</script>
</body>
</html>
