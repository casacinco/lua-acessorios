<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Lua Acessórios Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="../logo-lua.webp" alt="" style="width:28px;height:28px;object-fit:contain;border-radius:4px"> Lua Acessórios</div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__item"><span>📊</span> Dashboard</a>
      <a href="pedidos.html" class="sidebar__item"><span>📦</span> Pedidos</a>
      <a href="produtos.html" class="sidebar__item"><span>🏷️</span> Produtos</a>
      <a href="categorias.html" class="sidebar__item"><span>📂</span> Categorias</a>
      <a href="../index.html" class="sidebar__item" target="_blank"><span>🌐</span> Ver Site</a>
    </nav>
    <div class="sidebar__bottom">
      <div style="font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:8px" id="admin-email-display"></div>
      <button class="sidebar__item" onclick="logout()"><span>🚪</span> Sair</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Categorias</h1>
      <button class="btn btn--primary btn--sm" onclick="openModal()">+ Nova Categoria</button>
    </div>
    <div class="admin-content">
      <div class="table-card">
        <div class="table-header">
          <h2>Categorias cadastradas</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Nome</th>
                <th>Slug</th>
                <th>Ordem</th>
                <th style="text-align:right">Ações</th>
              </tr>
            </thead>
            <tbody id="cat-table-body">
              <tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
  <div style="background:white;border-radius:12px;padding:32px;width:100%;max-width:460px;margin:16px">
    <h2 id="modal-title" style="margin:0 0 24px;font-size:1.2rem">Nova Categoria</h2>
    <div class="form-group">
      <label>Nome <span>*</span></label>
      <input type="text" class="form-control" id="m-nome" placeholder="Ex: Chaveiros">
    </div>
    <div class="form-group">
      <label>Slug <span>*</span></label>
      <input type="text" class="form-control" id="m-slug" placeholder="Ex: chaveiros">
      <small style="color:var(--text-muted);font-size:.75rem">Usado na URL. Só letras minúsculas, números e hífens.</small>
    </div>
    <div class="form-group">
      <label>Ordem de exibição</label>
      <input type="number" class="form-control" id="m-ordem" placeholder="0" min="0">
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px">
      <button class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn--primary" onclick="saveCategoria()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/cart.js"></script>
<script src="../js/admin.js"></script>
<script>
requireAdmin();

let editingId = null;
let categorias = [];

async function loadCategorias() {
  const res = await apiFetch('/api/categorias');
  if (!res) return;
  categorias = await res.json();
  render();
}

function render() {
  const tbody = document.getElementById('cat-table-body');
  if (!categorias.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-muted)">Nenhuma categoria cadastrada.</td></tr>`;
    return;
  }
  tbody.innerHTML = categorias.map(c => `
    <tr>
      <td><strong>${c.nome}</strong></td>
      <td style="color:var(--text-muted);font-size:.85rem">${c.slug}</td>
      <td>${c.ordem}</td>
      <td style="text-align:right">
        <button class="btn btn--secondary btn--sm" onclick="openModal(${c.id})" style="margin-right:6px">Editar</button>
        <button class="btn btn--sm" style="background:#fee2e2;color:#dc2626;border:none" onclick="deleteCategoria(${c.id},'${c.nome}')">Excluir</button>
      </td>
    </tr>
  `).join('');
}

function openModal(id = null) {
  editingId = id;
  const overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'flex';
  if (id) {
    const cat = categorias.find(c => c.id === id);
    document.getElementById('modal-title').textContent = 'Editar Categoria';
    document.getElementById('m-nome').value = cat.nome;
    document.getElementById('m-slug').value = cat.slug;
    document.getElementById('m-ordem').value = cat.ordem;
  } else {
    document.getElementById('modal-title').textContent = 'Nova Categoria';
    document.getElementById('m-nome').value = '';
    document.getElementById('m-slug').value = '';
    document.getElementById('m-ordem').value = '';
    document.getElementById('m-nome').addEventListener('input', autoSlug);
  }
}

function autoSlug() {
  const nome = document.getElementById('m-nome').value;
  document.getElementById('m-slug').value = nome
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '');
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('m-nome').removeEventListener('input', autoSlug);
  editingId = null;
}

async function saveCategoria() {
  const nome = document.getElementById('m-nome').value.trim();
  const slug = document.getElementById('m-slug').value.trim();
  const ordem = parseInt(document.getElementById('m-ordem').value) || 0;
  if (!nome || !slug) { showToastAdmin('Nome e slug são obrigatórios', 'error'); return; }

  const url = editingId ? `/api/admin/categoria/${editingId}` : '/api/admin/categoria';
  const method = editingId ? 'PUT' : 'POST';
  const res = await apiFetch(url, { method, body: JSON.stringify({ nome, slug, ordem }) });
  if (!res) return;
  const data = await res.json();
  if (!res.ok) { showToastAdmin(data.error, 'error'); return; }
  showToastAdmin(editingId ? 'Categoria atualizada!' : 'Categoria criada!');
  closeModal();
  loadCategorias();
}

async function deleteCategoria(id, nome) {
  if (!confirm(`Excluir a categoria "${nome}"?`)) return;
  const res = await apiFetch(`/api/admin/categoria/${id}`, { method: 'DELETE' });
  if (!res) return;
  const data = await res.json();
  if (!res.ok) { showToastAdmin(data.error, 'error'); return; }
  showToastAdmin('Categoria excluída!');
  loadCategorias();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

loadCategorias();
</script>
</body>
</html>
