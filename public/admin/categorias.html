<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias — Lua Acessórios Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .drag-list { list-style: none; padding: 0; margin: 0; }
    .drag-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; border-bottom: 1px solid var(--border);
      background: white; cursor: grab; user-select: none;
      transition: background .15s;
    }
    .drag-item:last-child { border-bottom: none; }
    .drag-item:hover { background: var(--brand-light); }
    .drag-item.dragging { opacity: .4; background: var(--brand-light); cursor: grabbing; }
    .drag-item.drag-over { border-top: 2px solid var(--brand); }
    .drag-handle { color: var(--text-muted); font-size: 1.1rem; flex-shrink: 0; }
    .drag-item__info { flex: 1; }
    .drag-item__nome { font-weight: 600; }
    .drag-item__slug { font-size: .8rem; color: var(--text-muted); }
    .save-order-bar {
      display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--brand); color: white; padding: 12px 24px; border-radius: 999px;
      box-shadow: 0 4px 20px rgba(0,0,0,.2); gap: 12px; align-items: center;
      font-size: .9rem; font-weight: 600; z-index: 100;
    }
    .save-order-bar.visible { display: flex; }
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar__logo"><img src="../logo-lua.webp" alt="" style="width:28px;height:28px;object-fit:contain;border-radius:4px"> Lua Acessórios</div>
    <nav class="sidebar__nav">
      <a href="index.html" class="sidebar__item"><span>📊</span> Dashboard</a>
      <a href="pedidos.html" class="sidebar__item"><span>📦</span> Pedidos</a>
      <a href="produtos.html" class="sidebar__item"><span>🏷️</span> Produtos</a>
      <a href="categorias.html" class="sidebar__item"><span>📂</span> Categorias</a>
      <a href="../index.html" class="sidebar__item" target="_blank"><span>🌐</span> Ver Site</a>
    </nav>
    <div class="sidebar__bottom">
      <div style="font-size:.75rem;color:rgba(255,255,255,.4);margin-bottom:8px" id="admin-email-display"></div>
      <button class="sidebar__item" onclick="logout()"><span>🚪</span> Sair</button>
    </div>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1>Categorias</h1>
      <button class="btn btn--primary btn--sm" onclick="openModal()">+ Nova Categoria</button>
    </div>
    <div class="admin-content">
      <div class="table-card">
        <div class="table-header">
          <h2>Ordem do menu</h2>
          <span style="font-size:.8rem;color:var(--text-muted)">Arraste para reordenar</span>
        </div>
        <ul class="drag-list" id="drag-list">
          <li style="text-align:center;padding:32px;color:var(--text-muted)">Carregando...</li>
        </ul>
      </div>
    </div>
  </main>
</div>

<!-- Barra flutuante de salvar -->
<div class="save-order-bar" id="save-bar">
  <span>Ordem alterada</span>
  <button class="btn btn--sm" style="background:white;color:var(--brand);border:none;font-weight:700" onclick="saveOrder()">Salvar</button>
  <button class="btn btn--sm" style="background:rgba(255,255,255,.2);color:white;border:none" onclick="cancelOrder()">Cancelar</button>
</div>

<!-- MODAL -->
<div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center">
  <div style="background:white;border-radius:12px;padding:32px;width:100%;max-width:460px;margin:16px">
    <h2 id="modal-title" style="margin:0 0 24px;font-size:1.2rem">Nova Categoria</h2>
    <div class="form-group">
      <label>Nome <span>*</span></label>
      <input type="text" class="form-control" id="m-nome" placeholder="Ex: Chaveiros">
    </div>
    <div class="form-group">
      <label>Slug <span>*</span></label>
      <input type="text" class="form-control" id="m-slug" placeholder="Ex: chaveiros">
      <small style="color:var(--text-muted);font-size:.75rem">Usado na URL. Só letras minúsculas, números e hífens.</small>
    </div>
    <div style="display:flex;gap:12px;justify-content:flex-end;margin-top:24px">
      <button class="btn btn--secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn--primary" onclick="saveCategoria()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="../js/cart.js"></script>
<script src="../js/admin.js"></script>
<script>
requireAdmin();

let editingId = null;
let categorias = [];
let originalOrder = [];
let orderChanged = false;

async function loadCategorias() {
  const res = await apiFetch(`/api/categorias?_t=${Date.now()}`);
  if (!res) return;
  categorias = await res.json();
  originalOrder = categorias.map(c => c.id);
  orderChanged = false;
  document.getElementById('save-bar').classList.remove('visible');
  render();
}

function render() {
  const list = document.getElementById('drag-list');
  if (!categorias.length) {
    list.innerHTML = `<li style="text-align:center;padding:32px;color:var(--text-muted)">Nenhuma categoria cadastrada.</li>`;
    return;
  }
  list.innerHTML = categorias.map(c => `
    <li class="drag-item" draggable="true" data-id="${c.id}">
      <span class="drag-handle">☰</span>
      <div class="drag-item__info">
        <div class="drag-item__nome">${c.nome}</div>
        <div class="drag-item__slug">${c.slug}</div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn--secondary btn--sm" onclick="openModal(${c.id})">Editar</button>
        <button class="btn btn--sm" style="background:#fee2e2;color:#dc2626;border:none" onclick="deleteCategoria(${c.id},'${c.nome}')">Excluir</button>
      </div>
    </li>
  `).join('');
  initDrag();
}

// ── Drag & Drop ───────────────────────────────────────────────
let dragSrc = null;

function initDrag() {
  const items = document.querySelectorAll('.drag-item');
  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      dragSrc = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      document.querySelectorAll('.drag-item').forEach(i => i.classList.remove('drag-over'));
    });
    item.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.drag-item').forEach(i => i.classList.remove('drag-over'));
      if (item !== dragSrc) item.classList.add('drag-over');
    });
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrc && dragSrc !== item) {
        const list = document.getElementById('drag-list');
        const allItems = [...list.querySelectorAll('.drag-item')];
        const srcIdx = allItems.indexOf(dragSrc);
        const tgtIdx = allItems.indexOf(item);
        if (srcIdx < tgtIdx) list.insertBefore(dragSrc, item.nextSibling);
        else list.insertBefore(dragSrc, item);
        checkOrderChanged();
      }
    });
  });
}

function checkOrderChanged() {
  const currentOrder = [...document.querySelectorAll('.drag-item')].map(i => parseInt(i.dataset.id));
  orderChanged = currentOrder.some((id, i) => id !== originalOrder[i]);
  document.getElementById('save-bar').classList.toggle('visible', orderChanged);
}

async function saveOrder() {
  const items = [...document.querySelectorAll('.drag-item')];
  const ordem = items.map((item, i) => ({ id: parseInt(item.dataset.id), ordem: i }));
  const res = await apiFetch('/api/admin/categorias/reordenar', {
    method: 'POST',
    body: JSON.stringify({ ordem }),
  });
  if (!res) return;
  showToastAdmin('Ordem salva com sucesso!');
  loadCategorias();
}

function cancelOrder() {
  loadCategorias();
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  document.getElementById('modal-overlay').style.display = 'flex';
  if (id) {
    const cat = categorias.find(c => c.id === id);
    document.getElementById('modal-title').textContent = 'Editar Categoria';
    document.getElementById('m-nome').value = cat.nome;
    document.getElementById('m-slug').value = cat.slug;
  } else {
    document.getElementById('modal-title').textContent = 'Nova Categoria';
    document.getElementById('m-nome').value = '';
    document.getElementById('m-slug').value = '';
    document.getElementById('m-nome').addEventListener('input', autoSlug);
  }
}

function autoSlug() {
  const nome = document.getElementById('m-nome').value;
  document.getElementById('m-slug').value = nome
    .toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-|-$/g, '');
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  document.getElementById('m-nome').removeEventListener('input', autoSlug);
  editingId = null;
}

async function saveCategoria() {
  const nome = document.getElementById('m-nome').value.trim();
  const slug = document.getElementById('m-slug').value.trim();
  if (!nome || !slug) { showToastAdmin('Nome e slug são obrigatórios', 'error'); return; }

  // Manter a ordem atual ao editar; nova categoria vai para o final
  let ordem = 0;
  if (editingId) {
    ordem = categorias.find(c => c.id === editingId)?.ordem ?? 0;
  } else {
    ordem = categorias.length;
  }

  const url = editingId ? `/api/admin/categoria/${editingId}` : '/api/admin/categoria';
  const method = editingId ? 'PUT' : 'POST';
  const res = await apiFetch(url, { method, body: JSON.stringify({ nome, slug, ordem }) });
  if (!res) return;
  const data = await res.json();
  if (!res.ok) { showToastAdmin(data.error, 'error'); return; }

  // Update local array immediately (avoid stale server data overwriting correct data)
  if (editingId) {
    const idx = categorias.findIndex(c => c.id === editingId);
    if (idx >= 0) categorias[idx] = { ...categorias[idx], nome, slug, ordem };
  } else {
    const newCat = { id: data.id, nome, slug, ordem };
    categorias.push(newCat);
    originalOrder.push(data.id);
  }
  render();

  showToastAdmin(editingId ? 'Categoria atualizada!' : 'Categoria criada!');
  closeModal();
}

async function deleteCategoria(id, nome) {
  if (!confirm(`Excluir a categoria "${nome}"?`)) return;
  const res = await apiFetch(`/api/admin/categoria/${id}`, { method: 'DELETE' });
  if (!res) return;
  const data = await res.json();
  if (!res.ok) { showToastAdmin(data.error, 'error'); return; }
  showToastAdmin('Categoria excluída!');
  loadCategorias();
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

loadCategorias();
</script>
</body>
</html>
