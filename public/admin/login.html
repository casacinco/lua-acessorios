<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Login — Lua Acessórios</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo__icon" style="background:white;padding:4px">
        <img src="../logo-lua.webp" alt="Lua Acessórios" style="width:48px;height:48px;object-fit:contain">
      </div>
      <h1>Lua Acessórios</h1>
      <p>Área administrativa</p>
    </div>
    <div class="login-error" id="login-error">E-mail ou senha incorretos.</div>
    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" class="form-control" id="l-email" placeholder="seu@email.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" class="form-control" id="l-senha" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">Entrar</button>
    </form>
  </div>
</div>
<script src="../js/cart.js"></script>
<script>
  // Redirecionar se já logado
  if (localStorage.getItem('lua_admin_token')) {
    window.location.href = 'index.html';
  }

  async function doLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errEl = document.getElementById('login-error');
    btn.disabled = true;
    btn.textContent = 'Entrando...';
    errEl.style.display = 'none';

    try {
      const res = await fetch(`${API_URL}/api/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('l-email').value,
          senha: document.getElementById('l-senha').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('lua_admin_token', data.token);
      localStorage.setItem('lua_admin_email', data.email);
      window.location.href = 'index.html';
    } catch {
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }
</script>
</body>
</html>
